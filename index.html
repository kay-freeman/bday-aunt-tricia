<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Happy Birthday Aunt Tricia! 🍀</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">

<style>

:root{
--bg-dark:#041e15;
--bg-gradient:linear-gradient(135deg,#041e15 0%,#0a3d2e 100%);
--emerald-light:#1fb56a;
--emerald-dark:#0ea85a;
--gold-bright:#f1d78a;
--gold-deep:#d7b65b;
--paper-tint:#fffcf5;
--ink:#102018;
--accent-glow:rgba(241,215,138,.3);
}

*{box-sizing:border-box;}
html,body{height:100%;margin:0;}

body{
font-family:'Quicksand',sans-serif;
color:var(--ink);
background:var(--bg-gradient);
overflow-x:hidden;
display:flex;
flex-direction:column;
min-height:100vh;
}

/* FLOATING SHAMROCKS */

.shamrock{
position:fixed;
font-size:22px;
opacity:.15;
animation:floatShamrock linear infinite;
pointer-events:none;
}

@keyframes floatShamrock{
0%{transform:translateY(100vh) rotate(0deg);}
100%{transform:translateY(-20vh) rotate(360deg);}
}

/* BACKGROUND */

.bg-overlay{
position:fixed;
inset:0;
background-image:url('https://www.transparenttextures.com/patterns/dark-matter.png');
opacity:.3;
pointer-events:none;
z-index:0;
}

main{
max-width:1100px;
margin:auto;
padding:40px 20px;
position:relative;
z-index:10;
width:100%;
}

/* BUTTON HOVER IMPROVEMENT */

button{
transition:all .2s ease;
}

button:hover{
transform:translateY(-3px) scale(1.03);
box-shadow:0 10px 25px rgba(0,0,0,.2);
}

/* CARD */

.card{
position:relative;
border-radius:30px;
background:var(--paper-tint);
box-shadow:0 50px 100px rgba(0,0,0,.5);
overflow:hidden;
border:8px solid white;
}

.card-inner{
display:grid;
grid-template-columns:1.2fr .8fr;
min-height:600px;
}

@media(max-width:900px){
.card-inner{grid-template-columns:1fr;}
}

.content-area{
padding:60px 50px;
}

.title-group{
opacity:0;
transform:translateY(20px);
transition:all 1.2s ease-out;
}

.title-group.visible{
opacity:1;
transform:translateY(0);
}

h1{
font-family:'Cinzel',serif;
margin:0;
color:var(--bg-dark);
font-size:clamp(32px,5vw,54px);
}

.irish-sub{
display:block;
font-size:24px;
color:var(--emerald-dark);
margin-top:10px;
}

/* CANDLE */

.candle{
font-size:36px;
margin-top:10px;
cursor:pointer;
display:inline-block;
transition:transform .2s;
}

.candle:hover{
transform:scale(1.2);
}

/* MESSAGE BOX */

.message-reveal-box{
margin-top:30px;
background:white;
border-radius:20px;
padding:35px;
min-height:220px;
border:1px solid #eee;
box-shadow:inset 0 2px 10px rgba(0,0,0,.02);
transition:box-shadow .6s ease;
}

.message-reveal-box.glow{
box-shadow:0 0 25px var(--accent-glow);
}

.typewriter-text{
font-family:'Playfair Display',serif;
font-size:20px;
line-height:1.6;
}

.signature{
margin-top:25px;
opacity:0;
font-family:'Playfair Display',serif;
font-style:italic;
font-size:18px;
transition:opacity 1.5s ease;
}

.sidebar{
background:linear-gradient(to bottom,#fdfbfb 0%,#ebedee 100%);
padding:60px 40px;
border-left:1px solid #ddd;
}

.blessing-quote{
font-family:'Playfair Display',serif;
font-style:italic;
line-height:1.8;
border-left:4px solid var(--gold-deep);
padding-left:20px;
margin-bottom:40px;
min-height:120px;
transition:opacity .4s;
}

footer{
text-align:center;
padding:40px;
color:rgba(255,255,255,.6);
font-size:13px;
}

</style>
</head>

<body>

<div class="bg-overlay"></div>

<main>

<section class="card">
<div class="card-inner">

<div class="content-area">

<div class="title-group" id="headerGroup">

<h1>Happy Birthday,<br>Aunt Tricia! 🍀</h1>

<span class="irish-sub">Lá breithe sona duit!</span>

<div class="candle" id="candle">🕯️</div>

</div>

<p>
You hand-paint the prettiest cards...  
I’m not a painter, so I made you one with code.
</p>

<div style="margin-top:20px;">
<button onclick="revealMessage()">✨ Reveal my message</button>
<button onclick="fireCloverConfetti()">🍀 Clover confetti</button>
</div>

<div class="message-reveal-box" id="messageBox">

<p class="typewriter-text" id="typewriterTarget"></p>

<div class="signature" id="signature">
— Love always, Kay 💜
</div>

</div>

</div>

<aside class="sidebar">

<h3>Irish Blessing</h3>

<div class="blessing-quote" id="blessingTarget">
"May your day be filled with blessings like the sun that lights the sky..."
</div>

<button onclick="newBlessing()">🔄 New Blessing</button>

</aside>

</div>
</section>

<footer>
Made with ☘️ + ❤️ by Kay Thomas
</footer>

</main>

<script>

/* FLOATING SHAMROCKS */

function spawnShamrock(){
const shamrock=document.createElement("div");
shamrock.className="shamrock";
shamrock.textContent="🍀";
shamrock.style.left=Math.random()*100+"vw";
shamrock.style.animationDuration=(8+Math.random()*10)+"s";
document.body.appendChild(shamrock);
setTimeout(()=>shamrock.remove(),18000);
}

setInterval(spawnShamrock,1200);

/* CONFETTI */

function fireCloverConfetti(){
confetti({
particleCount:120,
spread:70,
origin:{y:.6}
});
}

/* BLESSINGS */

const blessings=[
"May the road rise up to meet you.",
"May your pockets be heavy and your heart be light.",
"May good luck pursue you each morning and night.",
"May the sun shine warm upon your face.",
"May friends gather around you wherever you go."
];

function newBlessing(){
const target=document.getElementById("blessingTarget");
target.style.opacity=0;

setTimeout(()=>{
target.textContent=blessings[Math.floor(Math.random()*blessings.length)];
target.style.opacity=1;
},400);
}

/* MESSAGE + SIGNATURE */

const message=`Happy birthday!

Thank you for every hand-painted card you’ve ever made me.

I can’t paint like you…
but I CAN code like a goblin with a mission.

Hope you enjoy your day!

Love you lots ❤️`;

let typing=false;

function revealMessage(){

if(typing) return;
typing=true;

const target=document.getElementById("typewriterTarget");
const box=document.getElementById("messageBox");

target.textContent="";
box.classList.add("glow");

let i=0;

function type(){

if(i<message.length){
target.textContent+=message.charAt(i);
i++;
setTimeout(type,35);
}

else{
typing=false;
revealSignature();
}

}

type();
fireCloverConfetti();

}

function revealSignature(){
const sig=document.getElementById("signature");
sig.style.opacity=1;
}

/* CANDLE */

document.getElementById("candle").onclick=()=>{

document.getElementById("candle").textContent="✨";

fireCloverConfetti();

setTimeout(()=>{
alert("Your birthday wish has been sent! 🍀");
},400);

};

/* TITLE FADE */

window.addEventListener('load',()=>{
document.getElementById('headerGroup').classList.add('visible');
setTimeout(fireCloverConfetti,500);
});

</script>

</body>
</html>
